<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pork Pay 🐷 — Swap Anything</title>

  <!-- Jupiter Plugin: the swap engine. This is loaded from Jupiter, maintained by them. -->
  <script src="https://terminal.jup.ag/main.js" data-preload defer></script>

  <style>
    :root {
      --pork-pink: #f7a8b8;
      --pork-dark: #2a1a1f;
      --pork-accent: #ff6b9d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #3a2630, var(--pork-dark));
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand h1 { font-size: 2.6rem; letter-spacing: -1px; }
    .brand .pig { font-size: 3rem; display: block; margin-bottom: 8px; }
    .brand p { color: var(--pork-pink); margin-top: 6px; font-size: 1rem; }

    /* This div is where Jupiter injects the swap UI */
    #pork-pay-widget {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .footnote {
      margin-top: 24px;
      color: #8a7a80;
      font-size: 0.8rem;
      text-align: center;
      max-width: 420px;
    }
    .footnote code { color: var(--pork-accent); }
  </style>
</head>
<body>
  <div class="brand">
    <span class="pig">🐷</span>
    <h1>Pork Pay</h1>
    <p>Swap any token. Powered by your liquidity.</p>
  </div>

  <div id="pork-pay-widget"></div>

  <p class="footnote">
    Every swap routed here pays a fee to your wallet.
    Edit <code>config.js</code> to set your wallet &amp; fee.
  </p>

  <script src="./config.js"></script>
  <script>
    window.Jupiter.init({
      // Render the swap UI inline inside our branded div (not a popup)
      displayMode: "integrated",
      integratedTargetId: "pork-pay-widget",

      formProps: {
        // ===== THIS IS HOW YOU EARN =====
        // Your Solana wallet / referral account that collects the fee.
        referralAccount: PORK_PAY_CONFIG.referralAccount,
        // Fee in basis points. 50 = 0.5%, 100 = 1%. Jupiter caps this.
        referralFee: PORK_PAY_CONFIG.referralFeeBps,
        // =================================
      },
    });
  </script>
</body>
</html>
