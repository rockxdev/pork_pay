<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pork Pay 🐷 — Swap Anything</title>

  <!-- Jupiter Plugin: the swap engine (wallet connect + swapping). RPC-less. -->
  <!-- NOTE: loaded WITHOUT defer so window.Jupiter exists before we init it. -->
  <script src="https://plugin.jup.ag/plugin-v1.js"></script>

  <style>
    :root {
      --pork-pink: #f7a8b8;
      --pork-dark: #2a1a1f;
      --pork-accent: #ff6b9d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #3a2630, var(--pork-dark));
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand h1 { font-size: 2.6rem; letter-spacing: -1px; }
    .brand .pig { font-size: 3rem; display: block; margin-bottom: 8px; }
    .brand p { color: var(--pork-pink); margin-top: 6px; font-size: 1rem; }

    /* Jupiter injects the swap UI into this div. min-height reserves space. */
    #pork-pay-widget {
      width: 100%;
      max-width: 420px;
      min-height: 568px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .loading {
      color: var(--pork-pink);
      text-align: center;
      padding: 40px 0;
    }
    .footnote {
      margin-top: 24px;
      color: #8a7a80;
      font-size: 0.8rem;
      text-align: center;
      max-width: 420px;
    }
  </style>
</head>
<body>
  <div class="brand">
    <span class="pig">🐷</span>
    <h1>Pork Pay</h1>
    <p>Connect your wallet. Swap any token. Buy $PORK.</p>
  </div>

  <div id="pork-pay-widget">
    <div class="loading">Loading swap… 🐷</div>
  </div>

  <p class="footnote">Powered by Jupiter liquidity on Solana.</p>

  <!-- Load your settings first... -->
  <script src="./config.js"></script>

  <!-- ...then start the plugin, but only once it has actually loaded. -->
  <script>
    function startPorkPay() {
      // If Jupiter hasn't loaded yet, wait and try again (load guard).
      if (!window.Jupiter || typeof window.Jupiter.init !== "function") {
        return setTimeout(startPorkPay, 100);
      }
      window.Jupiter.init({
        displayMode: "integrated",
        integratedTargetId: "pork-pay-widget",
        formProps: {
          // ===== how you earn =====
          referralAccount: PORK_PAY_CONFIG.referralAccount,
          referralFee: PORK_PAY_CONFIG.referralFeeBps,
          // ===== default to buying PORK =====
          initialInputMint: PORK_PAY_CONFIG.defaultInputMint,
          initialOutputMint: PORK_PAY_CONFIG.defaultOutputMint,
        },
      });
    }
    startPorkPay();
  </script>
</body>
</html>
