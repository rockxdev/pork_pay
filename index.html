<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pork Pay 🐷 — Swap Anything</title>

  <!-- Jupiter Plugin: the swap engine. Loaded WITHOUT defer so it's ready first. -->
  <script src="https://plugin.jup.ag/plugin-v1.js"></script>

  <style>
    :root {
      --pork-pink: #ff6b9d;
      --pork-dark: #2a1a1f;

      /* ===== Jupiter plugin theme (RGB, no rgb() wrapper) — pork palette ===== */
      --jupiter-plugin-primary: 255, 107, 157;      /* accent pink */
      --jupiter-plugin-background: 42, 26, 31;        /* deep pork */
      --jupiter-plugin-primaryText: 247, 232, 235;    /* near-white */
      --jupiter-plugin-warning: 251, 191, 36;
      --jupiter-plugin-interactive: 74, 47, 58;       /* inputs/buttons bg */
      --jupiter-plugin-module: 58, 38, 48;            /* card panels */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ===== Split background: John Pork | Daquavious Pork ===== */
    .bg {
      position: fixed; inset: 0; z-index: -2; display: flex;
      background: var(--pork-dark); /* fallback before images load */
    }
    .bg-half {
      flex: 1; background-size: cover; background-position: center;
      background-color: #1a0f13; /* shows if image missing */
    }
    .bg-john { background-image: url("./assets/john-pork.jpg"); }
    .bg-daq  { background-image: url("./assets/daquavious-pork.jpg"); }
    /* dark pork-tinted overlay so the widget stays readable over the photos */
    .bg-overlay {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(180deg, rgba(42,26,31,.62) 0%, rgba(42,26,31,.88) 100%);
    }

    .brand { text-align: center; margin-bottom: 24px; text-shadow: 0 2px 12px rgba(0,0,0,.6); }
    .brand .pig { font-size: 3rem; display: block; margin-bottom: 6px; }
    .brand h1 { font-size: 2.6rem; letter-spacing: -1px; }
    .brand p { color: var(--pork-pink); margin-top: 6px; font-size: 1rem; }

    #pork-pay-widget {
      width: 100%; max-width: 420px; min-height: 568px;
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .loading { color: var(--pork-pink); text-align: center; padding: 40px 0; }

    .tg-button {
      margin-top: 18px; display: inline-flex; align-items: center; gap: 8px;
      background: #229ED9; color: #fff; text-decoration: none; font-weight: 700;
      padding: 12px 22px; border-radius: 999px; font-size: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.45); transition: transform .1s ease;
    }
    .tg-button:hover { transform: translateY(-2px); }

    .footnote { margin-top: 22px; color: #c9a9b3; font-size: .8rem; text-align: center;
                text-shadow: 0 1px 6px rgba(0,0,0,.7); }
  </style>
</head>
<body>
  <!-- backgrounds -->
  <div class="bg">
    <div class="bg-half bg-john"></div>
    <div class="bg-half bg-daq"></div>
  </div>
  <div class="bg-overlay"></div>

  <div class="brand">
    <span class="pig">🐷</span>
    <h1>Pork Pay</h1>
    <p>Connect your wallet. Swap any token. Buy $PORK.</p>
  </div>

  <div id="pork-pay-widget">
    <div class="loading">Loading swap… 🐷</div>
  </div>

  <a class="tg-button" href="https://t.me/PorkPayBot" target="_blank" rel="noopener">
    🤖 Trade on Telegram
  </a>

  <p class="footnote">Pork Pay · powered by Jupiter liquidity on Solana</p>

  <script src="./config.js"></script>
  <script>
    function startPorkPay() {
      if (!window.Jupiter || typeof window.Jupiter.init !== "function") {
        return setTimeout(startPorkPay, 100); // load guard
      }
      window.Jupiter.init({
        displayMode: "integrated",
        integratedTargetId: "pork-pay-widget",
        containerStyles: { borderRadius: "20px" },
        branding: { name: "Pork Pay" },
        formProps: {
          referralAccount: PORK_PAY_CONFIG.referralAccount,
          referralFee: PORK_PAY_CONFIG.referralFeeBps,
          initialInputMint: PORK_PAY_CONFIG.defaultInputMint,
          initialOutputMint: PORK_PAY_CONFIG.defaultOutputMint,
        },
      });
    }
    startPorkPay();
  </script>
</body>
</html>
